<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>JobConnect</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOPO LOGIN -->
<header class="topo">
    <h1>JobConnect</h1>
    <p>Inclusão e oportunidades para todos</p>
</header>

<!-- LOGIN + CADASTRO -->
<div id="auth" class="auth-container">

    <div class="box">
        <h2>Login</h2>
        <input type="email" id="emailLogin" placeholder="E-mail">
        <input type="password" id="senhaLogin" placeholder="Senha">
        <button onclick="entrar()">Entrar</button>
    </div>

    <div class="box">
        <h2>Cadastro</h2>
        <input type="text" id="nomeCadastro" placeholder="Nome completo">
        <input type="email" id="emailCadastro" placeholder="E-mail">
        <input type="password" id="senhaCadastro" placeholder="Senha">
        <button onclick="cadastrarUsuario()">Cadastrar</button>
    </div>

</div>

<!-- SISTEMA -->
<div id="sistema" class="escondido">

<header class="header-sistema">
    <h2>Portal de Vagas</h2>
</header>

<div class="layout">

    <!-- CURRÍCULO -->
    <div class="painel">
        <h2>Enviar Currículo</h2>

        <p>Envie seu PDF:</p>
        <input type="file" accept="application/pdf">

        <button onclick="alert('Currículo enviado com sucesso!')">
            Enviar Currículo
        </button>
    </div>

    <!-- VAGAS -->
    <div class="painel">
        <h2>Vagas Disponíveis</h2>

        <div class="vaga">
            <h3>Assistente Administrativo</h3>
            <button onclick="verDetalhes('adm')">Ver detalhes</button>
        </div>

        <div class="vaga">
            <h3>Suporte Técnico</h3>
            <button onclick="verDetalhes('suporte')">Ver detalhes</button>
        </div>

    </div>

</div>

<!-- DETALHES -->
<div id="detalhes" class="detalhes escondido">

    <h2 id="tituloVaga"></h2>
    <p id="descricao"></p>
    <p id="local"></p>

    <button onclick="candidatar()">Candidatar-se</button>

    <div id="status" class="status escondido">
        ✔ Candidatura enviada com sucesso! Boa sorte 🍀
    </div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
