<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="banner">
    <h1>JobConnect</h1>
    <p>Inclusão e oportunidades para todos</p>
</header>

<div class="layout">

    <!-- VAGAS -->
    <div class="vagas">

        <div class="card">
            <h3>Assistente Administrativo</h3>
            <p>Empresa inclusiva buscando novos talentos.</p>
            <button onclick="selecionarVaga('Assistente Administrativo')">
                Candidatar-se
            </button>
        </div>

        <div class="card">
            <h3>Suporte Técnico</h3>
            <p>Oportunidade para trabalho híbrido.</p>
            <button onclick="selecionarVaga('Suporte Técnico')">
                Candidatar-se
            </button>
        </div>

    </div>

    <!-- CADASTRO -->
    <div class="cadastro">

        <h2>Cadastro da Candidatura</h2>

        <input type="text" id="nome" placeholder="Nome completo">
        <input type="email" id="email" placeholder="E-mail">
        <input type="text" id="telefone" placeholder="Telefone">

        <input type="text" id="vaga" placeholder="Vaga selecionada" readonly>

        <button onclick="cadastrar()">Cadastrar</button>

        <div id="status" class="status escondido">
            <h3>✔ Candidatura enviada com sucesso!</h3>
            <p>Boa sorte 🍀</p>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
