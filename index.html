<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>JobConnect</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topo">
    <h1>JobConnect</h1>
    <p>Inclusão e oportunidades para todos</p>
</header>

<!-- LOGIN + CADASTRO -->
<section id="auth" class="auth-container">

    <div class="box">
        <h2>Login</h2>

        <label for="emailLogin">E-mail</label>
        <input id="emailLogin" type="email">

        <label for="senhaLogin">Senha</label>
        <input id="senhaLogin" type="password">

        <button onclick="login()">Entrar</button>
    </div>

    <div class="box">
        <h2>Cadastro</h2>

        <label for="nomeCadastro">Nome</label>
        <input id="nomeCadastro" type="text">

        <label for="emailCadastro">E-mail</label>
        <input id="emailCadastro" type="email">

        <label for="senhaCadastro">Senha</label>
        <input id="senhaCadastro" type="password">

        <button onclick="cadastrarUsuario()">Cadastrar</button>
    </div>

</section>

<!-- SISTEMA -->
<section id="sistema" class="escondido">

<header class="header-sistema">
    <h2>Portal de Vagas</h2>
</header>

<div class="layout">

    <!-- CURRÍCULO -->
    <div class="painel">
        <h2>Currículo (PDF)</h2>

        <input type="file" accept="application/pdf">

        <button onclick="enviarCurriculo()">Enviar Currículo</button>
    </div>

    <!-- VAGAS -->
    <div class="painel">
        <h2>Vagas</h2>

        <div class="vaga">
            <h3>Assistente Administrativo</h3>
            <button onclick="verDetalhes('adm')">Ver detalhes</button>
        </div>

        <div class="vaga">
            <h3>Suporte Técnico</h3>
            <button onclick="verDetalhes('suporte')">Ver detalhes</button>
        </div>

    </div>

</div>

<!-- DETALHES -->
<div id="detalhes" class="detalhes escondido">

    <h2 id="tituloVaga"></h2>
    <p id="descricao"></p>
    <p id="local"></p>

    <button onclick="candidatar()">Candidatar-se</button>

    <p id="mensagem"></p>

</div>

<!-- KPIs -->
<div class="kpi">
    <p>Candidaturas: <span id="candidaturas">0</span></p>
    <p>Vagas visualizadas: <span id="vagas">0</span></p>
</div>

</section>

<script src="script.js"></script>
</body>
</html>
